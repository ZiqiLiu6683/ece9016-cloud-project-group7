<!DOCTYPE html>
<html>
<head>
    <title>ECE9016 Flask App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        table {
            border-collapse: collapse;
            width: 70%;
        }
        th, td {
            border: 1px solid #999;
            padding: 8px 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .msg {
            margin-top: 20px;
            color: green;
        }
        .err {
            margin-top: 20px;
            color: red;
        }
    </style>
</head>
<body>
    <h1>ECE9016 Cloud Project - Group 7</h1>

    {% if error_message %}
        <p class="err">{{ error_message }}</p>
    {% else %}
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                </tr>
            </thead>
            <tbody>
                {% for product in products %}
                <tr>
                    <td>{{ product.id }}</td>
                    <td>{{ product.name }}</td>
                    <td>{{ product.description }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <p class="msg">Data loaded from database.</p>
    {% endif %}
</body>
</html>
